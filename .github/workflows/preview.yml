name: Deploy Preview

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "gh-pages-deploy"
  cancel-in-progress: false

jobs:
  deploy-preview:
    if: github.event.label.name == 'preview'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx vite build --base=/consender/preview/

      - name: Deploy to gh-pages preview/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add /tmp/gh-pages FETCH_HEAD
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages
          fi

          cd /tmp/gh-pages
          rm -rf preview
          mkdir -p preview
          cp -r "${GITHUB_WORKSPACE}/dist/." preview/

          git add -A
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "Deploy preview for PR #${{ github.event.pull_request.number }} from ${{ github.event.pull_request.head.sha }}"
          git push origin HEAD:gh-pages

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '👁 Preview deployed: https://pnkfelix.github.io/consender/preview/'
            });

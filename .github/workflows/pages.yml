name: Deploy Site

on:
  push:
    branches: ["main"]
  pull_request_target:
    types: [labeled, unlabeled, closed, synchronize]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build main site
        run: |
          npm run build
          mkdir -p combined
          cp -r dist/. combined/

      - name: Build preview PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prs_json=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label preview \
            --state open \
            --json number,headRefName,title)

          prs_lines=$(echo "$prs_json" | jq -r '.[] | "\(.number) \(.headRefName)"')

          while IFS=" " read -r number ref; do
            [ -z "$number" ] && continue
            echo "::group::PR #${number} (${ref})"
            if git fetch origin "refs/heads/${ref}" \
               && git checkout FETCH_HEAD -- . \
               && npm install --silent \
               && npx vite build --base="/consender/preview/pr-${number}/"; then
              mkdir -p "combined/preview/pr-${number}"
              cp -r dist/. "combined/preview/pr-${number}/"
            else
              echo "::warning::PR #${number} preview build failed — skipping"
            fi
            git checkout origin/main -- .
            npm install --silent
            echo "::endgroup::"
          done <<< "$prs_lines"

          mkdir -p combined/preview
          {
            printf '%s\n' \
              '<!DOCTYPE html>' \
              '<html lang="en">' \
              '<head>' \
              '<meta charset="UTF-8">' \
              '<meta name="viewport" content="width=device-width, initial-scale=1.0">' \
              '<title>PR Previews &#x2013; consender</title>' \
              '<style>' \
              'body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #24292f; }' \
              'h1 { border-bottom: 2px solid #d0d7de; padding-bottom: 0.5rem; }' \
              'ul { list-style: none; padding: 0; }' \
              'li { padding: 0.6rem 0; border-bottom: 1px solid #d0d7de; }' \
              'a { text-decoration: none; color: #0969da; }' \
              'a:hover { text-decoration: underline; }' \
              '.pr-num { color: #57606a; margin-right: 0.4em; }' \
              '.back { font-size: 0.9em; margin-bottom: 1rem; }' \
              '</style>' \
              '</head>' \
              '<body>' \
              '<p class="back"><a href="/consender/">&#x2190; consender</a></p>' \
              '<h1>PR Previews</h1>'
            pr_count=$(echo "$prs_json" | jq 'length')
            if [ "$pr_count" -eq 0 ]; then
              echo '<p>No open PRs currently have the <code>preview</code> label.</p>'
            else
              echo '<ul>'
              echo "$prs_json" | jq -r '.[] | "<li><a href=\"/consender/preview/pr-\(.number)/\"><span class=\"pr-num\">#\(.number)</span> \(.title | @html)</a></li>"'
              echo '</ul>'
            fi
            printf '%s\n' '</body>' '</html>'
          } > combined/preview/index.html

      - name: Write build manifest
        run: |
          {
            echo "timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "main-sha: ${{ github.sha }}"
            echo "run: ${{ github.run_id }}/${{ github.run_attempt }}"
            echo "trigger: ${{ github.event_name }}"
          } > combined/_build-manifest.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: combined

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post preview comment
        if: github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name == 'preview'
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-url -->';
            const pr = context.payload.pull_request.number;
            const base = process.env.PAGE_URL.replace(/\/$/, '');
            const url = `${base}/preview/pr-${pr}/`;
            const body = `${marker}\n👁 Preview: ${url}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }

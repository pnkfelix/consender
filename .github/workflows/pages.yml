name: Deploy Site

on:
  push:
    branches: ["main"]
  pull_request:
    types: [labeled, unlabeled, closed]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build main site
        run: |
          npm run build
          mkdir -p combined
          cp -r dist/. combined/

      - name: Build preview PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prs=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label preview \
            --state open \
            --json number,headRefName \
            --jq '.[] | "\(.number) \(.headRefName)"')

          while IFS=" " read -r number ref; do
            [ -z "$number" ] && continue
            echo "::group::PR #${number} (${ref})"
            git fetch origin "refs/heads/${ref}"
            git checkout FETCH_HEAD -- .
            npx vite build --base="/consender/preview/pr-${number}/"
            mkdir -p "combined/preview/pr-${number}"
            cp -r dist/. "combined/preview/pr-${number}/"
            git checkout origin/main -- .
            echo "::endgroup::"
          done <<< "$prs"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: combined

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post preview comment
        if: github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'preview'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-url -->';
            const pr = context.payload.pull_request.number;
            const url = `https://pnkfelix.github.io/consender/preview/pr-${pr}/`;
            const body = `${marker}\n👁 Preview: ${url}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
